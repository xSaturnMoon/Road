name: Bloom
options:
  bundleIdPrefix: com.bloom
  deploymentTarget:
    iOS: "17.0"

targets:
  Bloom:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: version.json
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.bloom.app
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: "1" # iPhone only
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      DEVELOPMENT_TEAM: "" # Empty for unsigned/sideload
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: ""
      
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Bloom
        CFBundleName: Bloom
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "Bloom ha bisogno della tua posizione per mostrarti il meteo locale."
