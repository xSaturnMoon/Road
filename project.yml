name: Road
options:
  bundleIdPrefix: com.road
  deploymentTarget:
    iOS: "17.0"

targets:
  Road:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: version.json
      - path: Assets.xcassets
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.road.app
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: "1"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: ""

    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Road
        CFBundleName: Road
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "Road ha bisogno della tua posizione per mostrarti la mappa e calcolare il percorso."
