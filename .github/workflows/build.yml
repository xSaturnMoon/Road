name: Build Bloom IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build IPA (Unsigned)
        run: |
          xcodebuild archive \
            -project Bloom.xcodeproj \
            -scheme Bloom \
            -configuration Release \
            -archivePath build/Bloom.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

          mkdir -p Payload
          cp -r build/Bloom.xcarchive/Products/Applications/Bloom.app Payload/
          zip -r Bloom.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Bloom-Unsigned-IPA
          path: Bloom.ipa
