name: Build Bloom IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from version.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project Bloom.xcodeproj \
            -scheme Bloom \
            -configuration Release \
            -archivePath build/Bloom.xcarchive \
            PRODUCT_BUNDLE_IDENTIFIER=com.bloom.app \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package IPA
        run: |
          # Trova l'app indipendentemente dal percorso esatto dei Products
          APP_PATH=$(find build/Bloom.xcarchive -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRORE: App non trovata nell'archivio!"
            exit 1
          fi
          echo "App trovata in: $APP_PATH"
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Bloom.ipa Payload/
          echo "IPA creato con successo."

      - name: Delete old 'latest' release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin --delete latest 2>/dev/null || true

      - name: Create new 'latest' release with IPA
        uses: ncipollo/release-action@v1
        with:
          artifacts: "Bloom.ipa,manifest.plist"
          tag: "latest"
          name: "Bloom v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Bloom v${{ steps.version.outputs.VERSION }}
            
            Bundle ID: `com.bloom.app`
            
            ### Installazione
            Apri l'app Bloom → Impostazioni → Verifica Aggiornamenti
            
            ### Prima installazione
            Installa `Bloom.ipa` tramite Sideloadly.
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
