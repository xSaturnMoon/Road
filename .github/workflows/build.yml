name: Build Bloom IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build IPA (Unsigned)
        run: |
          xcodebuild archive \
            -project Bloom.xcodeproj \
            -scheme Bloom \
            -configuration Release \
            -archivePath build/Bloom.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

          mkdir -p Payload
          cp -r build/Bloom.xcarchive/Products/Applications/Bloom.app Payload/
          zip -r Bloom.ipa Payload
          
      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "Bloom.ipa"
          tag: "latest"
          name: "Bloom v1.0.5"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          body: "Aggiornamento Bloom v1.0.5 - Bundle ID unificato: com.bloom.app"
          token: ${{ secrets.GITHUB_TOKEN }}
