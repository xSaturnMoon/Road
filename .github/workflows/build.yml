name: Build Road IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Increment version in version.json
        id: version
        run: |
          python3 -c "
          import json
          with open('version.json', 'r') as f:
              data = json.load(f)
          parts = data['version'].split('.')
          parts[-1] = str(int(parts[-1]) + 1)
          data['version'] = '.'.join(parts)
          with open('version.json', 'w') as f:
              json.dump(data, f, indent=4)
          print('VERSION=' + data['version'])
          print('NOTES=' + data.get('notes', ''))
          " > output.txt
          VERSION=$(grep '^VERSION=' output.txt | cut -d '=' -f 2)
          NOTES=$(grep '^NOTES=' output.txt | cut -d '=' -f 2-)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "NOTES=$NOTES" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Update update.json
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python3 -c "
          import json, os
          with open('version.json', 'r') as f:
              version_data = json.load(f)
          
          data = {
            'version': os.environ['VERSION'],
            'notes': version_data.get('notes', ''),
            'url': 'https://github.com/xSaturnMoon/Road/releases/download/latest/Road.ipa'
          }
          with open('update.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print('update.json updated to version', os.environ['VERSION'])
          "

      - name: Commit and push update.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json version.json
          git diff --staged --quiet || git commit -m "chore: bump version to v${{ steps.version.outputs.VERSION }} [skip ci]"
          git push || true

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Update Info.plist Version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Sources/Info.plist 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" Sources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Sources/Info.plist 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $VERSION" Sources/Info.plist

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project Road.xcodeproj \
            -scheme Road \
            -configuration Release \
            -archivePath build/Road.xcarchive \
            -destination 'generic/platform=iOS' \
            PRODUCT_BUNDLE_IDENTIFIER=com.road.app \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            SWIFT_COMPILATION_MODE=singlefile

      - name: Package IPA
        run: |
          APP_PATH=$(find build/Road.xcarchive -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRORE: App non trovata nell'archivio!"
            exit 1
          fi
          echo "App trovata in: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Road.ipa Payload/
          echo "IPA creato con successo."

      - name: Delete old 'latest' release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin --delete latest 2>/dev/null || true

      - name: Create new 'latest' release with IPA
        uses: ncipollo/release-action@v1
        with:
          artifacts: "Road.ipa,manifest.plist"
          failOnMissingArtifact: false
          tag: "latest"
          name: "Road v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Road v${{ steps.version.outputs.VERSION }}
            
            Bundle ID: `com.road.app`
            
            ### Prima installazione
            Installa `Road.ipa` tramite Sideloadly o LiveContainer.
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}