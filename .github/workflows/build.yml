name: Build Bloom IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build IPA (Unsigned)
        run: |
          xcodebuild archive \
            -project Bloom.xcodeproj \
            -scheme Bloom \
            -configuration Release \
            -archivePath build/Bloom.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

          mkdir -p Payload
          cp -r build/Bloom.xcarchive/Products/Applications/Bloom.app Payload/
          zip -r Bloom.ipa Payload
          
      - name: Delete Old Release
        run: |
          gh release delete latest --yes || true
          git tag -d latest || true
          git push origin :refs/tags/latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create New Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Bloom v1.0.2 (Ultima Build)
          files: Bloom.ipa
          make_latest: true
          body: |
            Aggiornamento automatico di Bloom.
            - Sistema OTA stabilizzato.
            - Calendario Mensile con headers.
            - Bugfix build.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
